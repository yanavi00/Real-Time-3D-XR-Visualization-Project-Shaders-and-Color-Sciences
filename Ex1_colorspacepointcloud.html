<!DOCTYPE html>
<html>
<head>
  <title>Exercise 1 - Color Space Point-Cloud Visualisation</title>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
<script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      // 1. imports
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import { XRButton } from 'three/addons/webxr/XRButton.js';
      import { HTMLMesh } from 'three/addons/interactive/HTMLMesh.js';
      import { InteractiveGroup } from 'three/addons/interactive/InteractiveGroup.js';
      import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

      // 2. create scene
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1a1a1a); // Dark background for visibility
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 3);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(1);
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // OrbitControls setup
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;

      // 3. prepare media sources and shared state
      const sourceCanvas = document.createElement('canvas');
      const sourceCtx = sourceCanvas.getContext('2d');
      const videoElement = document.createElement('video');
      videoElement.autoplay = true;
      videoElement.muted = true;
      videoElement.playsInline = true;
      videoElement.loop = true;

      let pointCloud = null;
      let pointGeometry = null;
      let positionAttribute = null;
      let colorAttribute = null;
      let pointCount = 0;
      let isVideoSource = false;
      const sampleStep = 4;

      // 4. define shaders
      const vertexShader = `
        attribute vec3 rgbColor;
        uniform int colorSpace;
        uniform float scale;
        varying vec3 vColor;

        // sRGB to linear RGB
        vec3 sRGBToLinear(vec3 c) {
          return mix(c / 12.92, pow((c + 0.055) / 1.055, vec3(2.4)), step(0.04045, c));
        }

        // RGB to CIEXYZ with reordered matrix for column-major multiplication
        vec3 rgbToXyz(vec3 c) {
          c = sRGBToLinear(c);
          mat3 matrix = mat3(
            0.4124564, 0.2126729, 0.0193339,
            0.3575761, 0.7151522, 0.1191920,
            0.1804375, 0.0721750, 0.9503041
          );
          return matrix * c;
        }

        // CIEXYZ to CIExyY
        vec3 xyzToXyY(vec3 xyz) {
          float sum = xyz.x + xyz.y + xyz.z;
          sum = max(sum, 1e-10);
          return vec3(xyz.x / sum, xyz.y / sum, xyz.y);
        }

        // Helper function for LAB conversion
        float labHelper(float t) {
          float delta = 6.0 / 29.0;
          return t > delta * delta * delta ? pow(t, 1.0/3.0) : t / (3.0 * delta * delta) + 4.0/29.0;
        }

        // CIEXYZ to CIELAB
        vec3 xyzToLab(vec3 xyz) {
          vec3 white = vec3(0.95047, 1.00000, 1.08883);
          vec3 normalized = xyz / white;
          vec3 f = vec3(labHelper(normalized.x), labHelper(normalized.y), labHelper(normalized.z));
          float L = 116.0 * f.y - 16.0;
          float a = 500.0 * (f.x - f.y);
          float b = 200.0 * (f.y - f.z);
          return vec3(L, a, b);
        }

        // CIELAB to CIELCH
        vec3 labToLch(vec3 lab) {
          float C = length(lab.yz);
          float h = atan(lab.z, lab.y);
          return vec3(lab.x, C, h);
        }

        // RGB to HSV
        vec3 rgbToHsv(vec3 c) {
          vec4 K = vec4(0.0, -1.0/3.0, 2.0/3.0, -1.0);
          vec4 p = mix(vec4(c.bg, K.wz), vec4(c.gb, K.xy), step(c.b, c.g));
          vec4 q = mix(p, vec4(p.xyw, c.r), step(p.x, c.r));
          float d = q.x - min(q.w, q.y);
          return vec3(abs(q.z + (q.w - q.y) / (6.0 * d + 1e-10)), d / (q.x + 1e-10), q.x);
        }

        // RGB to CIELAB wrapper
        vec3 rgbToLab(vec3 c) {
          return xyzToLab(rgbToXyz(c));
        }

        // RGB to CIELCH wrapper
        vec3 rgbToLch(vec3 c) {
          return labToLch(rgbToLab(c));
        }

        // Normalize CIELAB to roughly [0, 1] for visualization
        vec3 normalizeLab(vec3 lab) {
          float L = clamp(lab.x / 100.0, 0.0, 1.0);
          float a = clamp((lab.y + 128.0) / 255.0, 0.0, 1.0);
          float b = clamp((lab.z + 128.0) / 255.0, 0.0, 1.0);
          return vec3(L, a, b);
        }

        // Normalize CIELCH to roughly [0, 1] for visualization
        vec3 normalizeLch(vec3 lch) {
          float L = clamp(lch.x / 100.0, 0.0, 1.0);
          float C = clamp(lch.y / 150.0, 0.0, 1.0);
          float h = fract(lch.z / 6.28318530718 + 1.0);
          return vec3(L, C, h);
        }

        // Convert color based on selected space
        vec3 convertColor(vec3 rgb, int space) {
          if (space == 0) return rgb;
          else if (space == 1) return rgbToHsv(rgb);
          else if (space == 2) return rgbToXyz(rgb);
          else if (space == 3) return xyzToXyY(rgbToXyz(rgb));
          else if (space == 4) return normalizeLab(rgbToLab(rgb));
          else if (space == 5) return normalizeLch(rgbToLch(rgb));
          return rgb;
        }

        void main() {
          vec3 convertedColor = convertColor(rgbColor, colorSpace);
          vec3 pos = (convertedColor - 0.5) * 2.0 * scale; // Center and scale the point cloud
          gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
          gl_PointSize = 3.0;
          vColor = rgbColor;
        }
        `
        ;

      // Fragment shader keeps the original RGB color for display
      const fragmentShader = `
        varying vec3 vColor;
        void main() {
          gl_FragColor = vec4(vColor, 1.0);
        }
      `;

      // 5. point-cloud helpers
      function createPointCloud(width, height) {
        pointCount = width * height;

        const positions = new Float32Array(pointCount * 3);
        const rgbColors = new Float32Array(pointCount * 3);

        pointGeometry = new THREE.BufferGeometry();
        positionAttribute = new THREE.BufferAttribute(positions, 3);
        colorAttribute = new THREE.BufferAttribute(rgbColors, 3);

        pointGeometry.setAttribute('position', positionAttribute);
        pointGeometry.setAttribute('rgbColor', colorAttribute);
        pointGeometry.computeBoundingSphere();

        const material = new THREE.ShaderMaterial({
          uniforms: {
            colorSpace: { value: 0 },
            scale: { value: 1.5 }
          },
          vertexShader: vertexShader,
          fragmentShader: fragmentShader
        });

        pointCloud = new THREE.Points(pointGeometry, material);
        scene.add(pointCloud);

        window.pointsMaterial = material;
      }

      // Downsample image/video frames before uploading points to the GPU
      function updatePointCloudFromImageData(imageData) {
        const { data, width, height } = imageData;
        const sampledWidth = Math.ceil(width / sampleStep);
        const sampledHeight = Math.ceil(height / sampleStep);
        const numPoints = sampledWidth * sampledHeight;

        if (!pointCloud || pointCount !== numPoints) {
          if (pointCloud) {
            scene.remove(pointCloud);
            pointGeometry.dispose();
          }
          createPointCloud(sampledWidth, sampledHeight);
        }

        // Iterate through the image data with the specified step and update the position and color attributes
        let i = 0;
        for (let y = 0; y < height; y += sampleStep) {
          for (let x = 0; x < width; x += sampleStep) {
            const pixelIndex = (y * width + x) * 4;
            const r = data[pixelIndex] / 255;
            const g = data[pixelIndex + 1] / 255;
            const b = data[pixelIndex + 2] / 255;

            positionAttribute.array[i * 3] = r;
            positionAttribute.array[i * 3 + 1] = g;
            positionAttribute.array[i * 3 + 2] = b;

            colorAttribute.array[i * 3] = r;
            colorAttribute.array[i * 3 + 1] = g;
            colorAttribute.array[i * 3 + 2] = b;
            i++;
          }
        }

        positionAttribute.needsUpdate = true;
        colorAttribute.needsUpdate = true;
        pointGeometry.computeBoundingSphere();
      }

      // 6. media loading
      async function loadMediaSource(mediaSource) {
        isVideoSource = mediaSource.type === 'video';

        const loader = new THREE.ImageLoader();
        if (isVideoSource) {
          videoElement.src = mediaSource.src;
          await videoElement.play();
          await new Promise((resolve) => {
            if (videoElement.readyState >= 1) {
              resolve();
              return;
            }
            videoElement.onloadedmetadata = () => resolve();
          });

          sourceCanvas.width = videoElement.videoWidth;
          sourceCanvas.height = videoElement.videoHeight;
          return;
        }

        const image = await loader.loadAsync(mediaSource.src);
        sourceCanvas.width = image.width;
        sourceCanvas.height = image.height;
        sourceCtx.drawImage(image, 0, 0);
        const imageData = sourceCtx.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
        updatePointCloudFromImageData(imageData);
      }

      // 7. pick media source
      const mediaSource = {
        type: 'image',
        src: 'assets/image.png'
      };

      // 8. setup initial data
      await loadMediaSource(mediaSource);

      // 9. shared render loop (desktop + XR)
      function renderFrame() {
        if (isVideoSource && videoElement.readyState >= 2) {
          sourceCtx.drawImage(videoElement, 0, 0, sourceCanvas.width, sourceCanvas.height);
          const frameData = sourceCtx.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
          updatePointCloudFromImageData(frameData);
        }
        if (controls.enabled) controls.update();
        renderer.render(scene, camera);
      }

      renderer.setAnimationLoop(renderFrame);

      // 10. setup XR
      // Optional panel is shown in XR, and optional target object is moved in front of the user.
      function setupXR(renderer, scene, camera, orbitControls, htmlPanel, xrTargetObject = null) {
        renderer.xr.enabled = true;

        let savedTransform = null;

        // When an XR session starts, disable orbit controls and optionally move the target object to a fixed position in front of the user
        renderer.xr.addEventListener('sessionstart', () => {
          if (orbitControls) orbitControls.enabled = false;
          if (!xrTargetObject) return;
          savedTransform = {
            position: xrTargetObject.position.clone(),
            quaternion: xrTargetObject.quaternion.clone(),
            scale: xrTargetObject.scale.clone()
          };

          // Place the visualized object in front of the user at a comfortable height.
          xrTargetObject.position.set(0.0, 1.5, -2.0);
          xrTargetObject.quaternion.identity();
          xrTargetObject.scale.set(1.0, 1.0, 1.0);
        });

        // When the XR session ends, restore the original state of the target object and re-enable orbit controls
        renderer.xr.addEventListener('sessionend', () => {
          if (orbitControls) orbitControls.enabled = true;
          if (!xrTargetObject || !savedTransform) return;
          xrTargetObject.position.copy(savedTransform.position);
          xrTargetObject.quaternion.copy(savedTransform.quaternion);
          xrTargetObject.scale.copy(savedTransform.scale);
          savedTransform = null;
        });
        
        document.body.appendChild(XRButton.createButton(renderer));
        
        const controller1 = renderer.xr.getController(0);
        const controller2 = renderer.xr.getController(1);
        scene.add(controller1);
        scene.add(controller2);
        
        const controllerModelFactory = new XRControllerModelFactory();
        
        const grip1 = renderer.xr.getControllerGrip(0);
        grip1.add(controllerModelFactory.createControllerModel(grip1));
        scene.add(grip1);
        
        const grip2 = renderer.xr.getControllerGrip(1);
        grip2.add(controllerModelFactory.createControllerModel(grip2));
        scene.add(grip2);
        
        // If an HTML panel is provided, create an interactive group and add the panel as a mesh within it to enable XR interactions
        if (htmlPanel) {
          const group = new InteractiveGroup(renderer, camera);
          group.listenToPointerEvents(renderer, camera);
          group.listenToXRControllerEvents(controller1);
          group.listenToXRControllerEvents(controller2);
          scene.add(group);
          
          const mesh = new HTMLMesh(htmlPanel);
          mesh.position.set(-0.9, 0.8, -1.2);
          mesh.rotation.x = -0.25;
          mesh.scale.setScalar(1.2);
          group.add(mesh);
        }
      }

      // 11. UI helpers
      function createColorSpaceSelector(onChange) {
        const controlsDiv = document.createElement('div');
        controlsDiv.style.cssText = 'position: absolute; top: 10px; left: 10px; background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 5px; font-family: Arial; z-index: 100;';

        const label = document.createElement('label');
        label.textContent = 'Color Space: ';
        label.style.marginRight = '10px';
        label.style.fontWeight = 'bold';

        const select = document.createElement('select');
        select.style.cssText = 'padding: 8px; font-size: 14px; cursor: pointer;';
        select.innerHTML = `
          <option value="0">RGB</option>
          <option value="1">HSV</option>
          <option value="2">CIEXYZ</option>
          <option value="3">CIExyY</option>
          <option value="4">CIELAB</option>
          <option value="5">CIELCH</option>
        `;

        select.addEventListener('change', (e) => {
          onChange(parseInt(e.target.value, 10));
        });

        controlsDiv.appendChild(label);
        controlsDiv.appendChild(select);
        document.body.appendChild(controlsDiv);
        return controlsDiv;
      }

      const controlsDiv = createColorSpaceSelector((colorSpaceValue) => {
        if (window.pointsMaterial) {
          window.pointsMaterial.uniforms.colorSpace.value = colorSpaceValue;
        }
      });

      // 12. connect XR interactions
      setupXR(renderer, scene, camera, controls, controlsDiv, pointCloud);
    </script>
  </body>
</html>
